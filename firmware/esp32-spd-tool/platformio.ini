[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = huge_app.csv

monitor_speed = 115200
upload_speed = 921600

monitor_echo = yes
monitor_eol = LF

; --- monitor polish ---
monitor_dtr = 0
monitor_rts = 0

; Keep timestamps in monitor output
monitor_filters =
  time
